<!DOCTYPE html>
<html>
<head>
    <title>California House Price Prediction</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#007bff;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            color:green;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>California House Price Prediction</h1>

    <form action="{{ url_for('predict') }}" method="post">

        <input type="text" name="MedInc" placeholder="MedInc" required>

        <input type="text" name="HouseAge" placeholder="HouseAge" required>

        <input type="text" name="AveRooms" placeholder="AveRooms" required>

        <input type="text" name="AveBedrms" placeholder="AveBedrms" required>

        <input type="text" name="Population" placeholder="Population" required>

        <input type="text" name="AveOccup" placeholder="AveOccup" required>

        <input type="text" name="Latitude" placeholder="Latitude" required>

        <input type="text" name="Longitude" placeholder="Longitude" required>

        <button type="submit">Predict</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
